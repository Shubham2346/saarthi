# Nginx Configuration for Smart Student Onboarding Agent
# Production-Ready Setup with SSL, Compression, and Load Balancing

upstream backend {
    # Round-robin load balancing across backend instances
    least_conn;
    server backend-1:8000 weight=1;
    server backend-2:8000 weight=1;
    server backend-3:8000 weight=1;
    
    # Keepalive connections to upstream
    keepalive 32;
}

upstream ollama {
    server ollama:11434;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=1000r/m;

# ============================================================================
# HTTP Redirect to HTTPS
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS Main Server
# ============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saarthi.edu.in www.saarthi.edu.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/saarthi.edu.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saarthi.edu.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:;" always;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;
    gzip_disable "msie6";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffer sizes
    client_max_body_size 50M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Logging
    access_log /var/log/nginx/saarthi_access.log combined buffer=32k;
    error_log /var/log/nginx/saarthi_error.log warn;
    
    # Root path - redirect to app
    location = / {
        return 302 http://$host/app;
    }
    
    # ========================================================================
    # FRONTEND APPLICATION (Next.js)
    # ========================================================================
    
    location /app {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        
        # Websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Caching for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend:3000;
            proxy_cache_valid 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ========================================================================
    # BACKEND API (FastAPI)
    # ========================================================================
    
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Connection management
        proxy_set_header Connection "";
        proxy_set_header Keep-Alive "";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Websocket support for chat
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts for long-running requests (chat, document processing)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # ========================================================================
    # API DOCUMENTATION (Swagger)
    # ========================================================================
    
    location /api/docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /api/redoc {
        proxy_pass http://backend/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ========================================================================
    # HEALTH CHECK
    # ========================================================================
    
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        access_log off;
    }
    
    # ========================================================================
    # STATIC FILES & CACHING
    # ========================================================================
    
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    
    # ========================================================================
    # SECURITY: DENY SENSITIVE FILES
    # ========================================================================
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================================
# METRICS ENDPOINT (Prometheus)
# ============================================================================

server {
    listen 9000;
    listen [::]:9000;
    server_name _;
    
    location /metrics {
        proxy_pass http://backend:8000/metrics;
    }
}
