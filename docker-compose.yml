version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saarthi_db
    environment:
      POSTGRES_USER: saarthi_user
      POSTGRES_PASSWORD: saarthi_password
      POSTGRES_DB: saarthi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saarthi_user -d saarthi"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: saarthi_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saarthi_backend
    environment:
      - APP_ENV=production
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql+asyncpg://saarthi_user:saarthi_password@db:5432/saarthi
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - JWT_SECRET=change_this_to_a_secure_random_string
    ports:
      - "8080:8000" # Expose backend on 8080 to avoid clash with chroma
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saarthi_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
